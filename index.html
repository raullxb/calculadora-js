<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadoras</title>
  </head>
  <body>
    <h1>Calculadora Simples</h1>
    <label for="">Número 1: </label>
    <input type="number" id="num1" />

    <label for="">Número 2: </label>
    <input type="number" id="num2" />
    
    <button onclick="somar()">Somar</button>

    <h2 id="resultado">Resultado:</h2>

    <h1>Calculadora</h1>
    
    <input type="number" id="numero1" />
    <input type="number" id="numero2" />

    <button onclick="somarCompleto()">Somar</button>
    <button onclick="subtrair()">Subtrair</button>
    <button onclick="multiplicar()">Multiplicar</button>
    <button onclick="dividir()">Dividir</button>
    <button onclick="limpar()">Limpar</button>

    <h2 id="resultado3">Resultado Calculadora:</h2>

    <h1>Cálculo de Nota e Verificação de Aprovação</h1>
    <label for="">Nota AP1: </label>
    <input type="number" id="nota1" />

    <label for="">Nota AP2: </label>
    <input type="number" id="nota2" />

    <label for="">Nota AS: </label>
    <input type="number" id="nota3" />

    <button onclick="media()">Média</button>
    <h3 id="resultado2">Resultado média:</h3>
    <script src="./script.js"></script>
  </body>
</html>
